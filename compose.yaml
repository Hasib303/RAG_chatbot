name: rag-chatbot

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://ollama:11434}
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-service-account.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - app_uploads:/app/data/uploads
      - app_indexes:/app/data/indexes
      - type: bind
        source: ${FIREBASE_SERVICE_ACCOUNT_FILE:-./firebase-service-account.json}
        target: /run/secrets/firebase-service-account.json
        read_only: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health").read()
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  app_uploads:
  app_indexes:
  ollama_data:
